<!DOCTYPE html>
  <html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buckshot Roulette</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; background: #0a0a0a; overflow: hidden; }
      #loading-screen {
        position: fixed; inset: 0; background: #0a0a0a;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 16px; z-index: 100;
      }
      #loading-screen h2 {
        font-family: "Courier New", monospace; font-size: 22px; letter-spacing: 6px;
        color: #b8a020; text-shadow: 0 0 16px #b8a02099;
      }
      #loading-screen .subtitle {
        font-family: "Courier New", monospace; font-size: 11px;
        color: #444; letter-spacing: 2px;
      }
      #loading-screen .spinner {
        width: 40px; height: 40px;
        border: 3px solid #222;
        border-top: 3px solid #b8a020;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      #gameContainer {
        display: none; position: fixed; inset: 0; background: #000;
      }
      #gameContainer.active { display: block; }
      #gameContainer iframe {
        width: 100%; height: 100%; border: none; display: block;
      }
    </style>
  </head>
  <body>
  <div id="loading-screen">
    <div class="spinner"></div>
    <h2>BUCKSHOT ROULETTE</h2>
    <div class="subtitle">loading game...</div>
  </div>
  <div id="gameContainer">
    <iframe
      id="gameFrame"
      src="https://period.mentor.math.principal.online.ovieags.gob.mx/5/html/Buckshot%20Roulette/game/index.html"
      allow="fullscreen; pointer-lock"
      allowfullscreen>
    </iframe>
  </div>
  <script>
  (function () {
    var frame = document.getElementById("gameFrame");
    var loading = document.getElementById("loading-screen");
    var container = document.getElementById("gameContainer");
    frame.addEventListener("load", function () {
      loading.style.display = "none";
      container.classList.add("active");
    });
    setTimeout(function () {
      loading.style.display = "none";
      container.classList.add("active");
    }, 5000);
  })();
  </script>
  </body>
  </html>
