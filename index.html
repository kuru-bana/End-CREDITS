<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>END CREDITS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif}
#unity-container{position:relative;width:min(100vw,calc(100vh*16/9));aspect-ratio:16/9}
canvas{width:100%!important;height:100%!important;display:block}
#unity-loading-bar{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;z-index:10}
#unity-logo{color:#fff;font-size:18px;margin-bottom:16px;letter-spacing:4px}
#unity-progress-bar-empty{width:240px;height:8px;background:#333;border-radius:4px;overflow:hidden}
#unity-progress-bar-full{height:100%;width:0%;background:#fff;border-radius:4px;transition:width 0.2s}
#unity-error{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:#000;color:#f66;padding:20px;text-align:center}
</style>
</head>
<body>
<div id="unity-container">
  <canvas id="unity-canvas"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo">LOADING...</div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
  </div>
  <div id="unity-error"></div>
</div>
<script>
(function(){
  var CDN = "https://cdn.jsdelivr.net/gh/kuru-bana/End-CREDITS@main/webgl";
  var RAW = "https://raw.githubusercontent.com/kuru-bana/End-CREDITS/main/webgl";

  var loaderUrl = CDN + "/webgl.loader.js";
  var config = {
    dataUrl:      CDN + "/webgl.data.gz",
    frameworkUrl: CDN + "/webgl.framework.js.gz",
    codeUrl:      RAW + "/webgl.wasm.gz",
    streamingAssetsUrl: "StreamingAssets",
    companyName: "empty",
    productName: "END CREDITS",
    productVersion: "0"
  };

  var canvas   = document.getElementById("unity-canvas");
  var loadBar  = document.getElementById("unity-loading-bar");
  var progress = document.getElementById("unity-progress-bar-full");
  var errDiv   = document.getElementById("unity-error");

  var script = document.createElement("script");
  script.src = loaderUrl;
  script.onerror = function() {
    errDiv.style.display = "flex";
    errDiv.textContent = "ゲームの読み込みに失敗しました。ページを再読み込みしてください。";
  };
  script.onload = function() {
    createUnityInstance(canvas, config, function(p) {
      progress.style.width = (100 * p) + "%";
    }).then(function() {
      loadBar.style.display = "none";
    }).catch(function(msg) {
      errDiv.style.display = "flex";
      errDiv.textContent = msg;
    });
  };
  document.body.appendChild(script);
})();
</script>
</body>
</html>
