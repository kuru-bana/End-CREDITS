<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Run 2</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #111; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    #status {
      position: fixed; inset: 0; background: #111;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 12px; z-index: 100;
    }
    #status h2 {
      font-family: "Courier New", monospace; font-size: 22px;
      letter-spacing: 4px; color: #fff;
    }
    #status .sub {
      font-family: "Courier New", monospace; font-size: 11px;
      color: #888; letter-spacing: 2px;
    }
    #ruffle-container { width: 100vw; height: 100vh; }
    #ruffle-container ruffle-player { width: 100%; height: 100%; }
  </style>
</head>
<body>
<div id="status">
  <h2>RUN 2</h2>
  <div class="sub" id="statusText">Loading...</div>
</div>
<div id="ruffle-container"></div>
<script src="https://mathcordxp.github.io/swf/ruffle/ruffle.js"></script>
<script>
window.addEventListener('load', function () {
  var statusEl  = document.getElementById('status');
  var statusTxt = document.getElementById('statusText');
  var RufflePlayer = window.RufflePlayer;
  if (!RufflePlayer) { statusTxt.textContent = 'Error: Ruffle not loaded'; return; }
  var ruffle = RufflePlayer.newest();
  var player = ruffle.createPlayer();
  player.style.width = '100%';
  player.style.height = '100%';
  document.getElementById('ruffle-container').appendChild(player);
  statusTxt.textContent = 'Loading game...';
  player.load({
    url: 'https://cdn.jsdelivr.net/gh/kuru-bana/End-CREDITS@main/run-2/run2.swf',
    autoplay: 'on',
    unmuteOverlay: 'hidden',
  }).then(function () {
    statusEl.style.display = 'none';
  }).catch(function (e) {
    statusTxt.textContent = 'Error: ' + (e.message || String(e));
  });
});
</script>
</body>
</html>
